name: Update Dashboard

on:
  schedule:
    # רץ פעם ביום ב-6 בבוקר כדי לרענן נתונים מ-GitLab
    - cron: '0 6 * * *'
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור מתוך גיטהאב
  repository_dispatch:
    types: [megamap_update]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run update script
      env:
        # המשתנים האלו יהיו קיימים *רק* אם הריצה הופעלה מהריפו הפרטי. 
        # אם הריצה היא מה-Cron, הם יהיו ריקים (None).
        MEGAMAP_TOTAL: ${{ github.event.client_payload.total_run }}
        MEGAMAP_SUCCESS: ${{ github.event.client_payload.success_count }}
        MEGAMAP_FAILED: ${{ github.event.client_payload.failed_count }}
      run: python update_dashboard.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # הוספת ה-index.html שתמיד נוצר
        git add index.html
        
        # בדיקה אם קובץ ה-JSON קיים פיזית, ורק אז הוספה שלו (מונע שגיאות קריסה)
        if [ -f pipeline_stats.json ]; then
          git add pipeline_stats.json
        fi
        
        # ביצוע ה-Commit רק אם יש שינויים אמיתיים
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Automated dashboard update [skip ci]"
          git push
        fi
