name: Update Dashboard

on:
  schedule:
    # הרצה תקופתית פעמיים ביום (למשל לצורך רענון מול גיטלאב)
    - cron: '0 6,18 * * *'
  workflow_dispatch: # מאפשר לך להריץ גם ידנית בלחיצת כפתור
  # שורות אלו מאפשרות לריפו הפרטי של המגמפ להעיר את הדשבורד עם נתונים
  repository_dispatch:
    types: [megamap_update]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run update script
      env:
        # העברת הנתונים שמגיעים מהריפו הפרטי (אם הגיעו) לתוך משתני סביבה של פייתון
        MEGAMAP_TOTAL: ${{ github.event.client_payload.total_run || 'N/A' }}
        MEGAMAP_SUCCESS: ${{ github.event.client_payload.success_count || 'N/A' }}
        MEGAMAP_FAILED: ${{ github.event.client_payload.failed_count || 'N/A' }}
      run: python update_dashboard.py
      
